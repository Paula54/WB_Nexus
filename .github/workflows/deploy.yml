name: Deploy Edge Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Resolve o aviso do log que me enviaste
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      # NOTE: `supabase db push` desativado intencionalmente.
      # Schema é gerido manualmente em produção (regra Core do projeto).
      # Reativar apenas após sincronizar histórico com `db pull` + `migration repair`.

      # Este passo só corre se a pasta da função existir, para evitar o "Exit code 1"
      - name: Deploy Functions
        run: |
          if [ -d "supabase/functions/create-checkout" ]; then
            supabase functions deploy create-checkout --no-verify-jwt
          fi
          if [ -d "supabase/functions/stripe-webhook" ]; then
            supabase functions deploy stripe-webhook --no-verify-jwt
          fi
          if [ -d "supabase/functions/generate-social-content" ]; then
            supabase functions deploy generate-social-content --no-verify-jwt
          fi
          if [ -d "supabase/functions/publish-social-post" ]; then
            supabase functions deploy publish-social-post --no-verify-jwt
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
